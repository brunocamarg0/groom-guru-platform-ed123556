# Configuração Nixpacks para Railway
# Railway usa Nixpacks para detectar e buildar automaticamente

[phases.setup]
# IMPORTANTE: backend usa dependências que exigem Node 20+ (ex: resend)
# Formato correto: nodejs_20 (não nodejs-20_x)
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm start"

