# Configuração Nixpacks para Railway
# Railway usa Nixpacks para detectar e buildar automaticamente

[phases.setup]
nixPkgs = ["nodejs-18_x", "npm-9_x"]

[phases.install]
cmds = [
  "cd backend",
  "npm ci"
]

[phases.build]
cmds = [
  "cd backend",
  "npm run prisma:generate",
  "npm run build"
]

[start]
cmd = "cd backend && npm start"

