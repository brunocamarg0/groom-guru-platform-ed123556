# Configuração Nixpacks para Railway
# Railway usa Nixpacks para detectar e buildar automaticamente

[phases.setup]
# IMPORTANTE: backend usa dependências que exigem Node 20+ (ex: resend)
nixPkgs = ["nodejs-20_x", "npm-10_x"]

[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

# Executar migrações após build (apenas se necessário)
# Descomente a linha abaixo se quiser executar migrações automaticamente no deploy
# [phases.postbuild]
# cmds = [
#   "npx prisma db push --accept-data-loss"
# ]

[start]
cmd = "npm start"

